<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitCoach — Fitness Q&amp;A</title>
  <style>
    :root { --bg: #0f1115; --panel: #1a1d24; --user: #2563eb; --bot: #2a2e37; --text: #e7e9ee; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; display: flex;
      flex-direction: column; align-items: center;
    }
    header { padding: 16px; font-weight: 600; font-size: 18px; }
    #chat {
      flex: 1; width: 100%; max-width: 720px; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg { padding: 10px 14px; border-radius: 14px; max-width: 80%; white-space: pre-wrap;
           line-height: 1.45; word-wrap: break-word; }
    .user { background: var(--user); align-self: flex-end; border-bottom-right-radius: 4px; }
    .bot  { background: var(--bot);  align-self: flex-start; border-bottom-left-radius: 4px; }
    .meta { font-size: 12px; opacity: 0.6; align-self: flex-start; }
    form {
      width: 100%; max-width: 720px; display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid #262a33; background: var(--panel);
    }
    #input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333;
             background: #11141a; color: var(--text); font-size: 15px; }
    button { padding: 12px 18px; border: none; border-radius: 10px; background: var(--user);
             color: white; font-size: 15px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>🏋️ FitCoach — ask me about workouts &amp; fitness</header>
  <div id="chat"></div>
  <form id="form">
    <input id="input" autocomplete="off" placeholder="e.g. How do I start a beginner full-body routine?" />
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    // KEY IDEA: the browser owns the conversation history. We keep it in this
    // array and send the WHOLE thing to the server on every request, because the
    // model itself is stateless — it has no memory between calls.
    const messages = [];

    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addBubble(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "bot");
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      // Show + record the user's message.
      addBubble("user", text);
      messages.push({ role: "user", content: text });
      input.value = "";
      sendBtn.disabled = true;

      // Temporary "thinking..." bubble we'll replace with the real reply.
      const thinking = addBubble("assistant", "…");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || ("HTTP " + res.status));
        }
        const data = await res.json();
        thinking.textContent = data.reply;
        // Record the assistant's reply so the next turn has full context.
        messages.push({ role: "assistant", content: data.reply });
      } catch (err) {
        thinking.textContent = "⚠️ " + err.message;
        // Drop the user turn we couldn't answer so history stays consistent.
        messages.pop();
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
