steps:
  # Step 1: Build and deploy the container image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - fitness-qa
      - --source=.
      - --region=asia-south1
      - --allow-unauthenticated
      - --update-env-vars=MODEL_ID=gemini-3.1-flash-lite,MAX_TOKENS=1024

  # Step 2: Set the API key separately using the secret value
  # --update-env-vars runs in a shell so $$GOOGLE_API_KEY expands correctly
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run services update fitness-qa \
          --region=asia-south1 \
          --update-env-vars=GOOGLE_API_KEY=$$GOOGLE_API_KEY
    secretEnv: ['GOOGLE_API_KEY']

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/GOOGLE_API_KEY/versions/latest
    env: GOOGLE_API_KEY

options:
  logging: CLOUD_LOGGING_ONLY
